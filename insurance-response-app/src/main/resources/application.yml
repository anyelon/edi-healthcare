server:
  port: 8082

spring:
  application:
    name: insurance-response-app
  data:
    mongodb:
      uri: mongodb://localhost:27017/edi_healthcare
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
